name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Valhalla JDK
        id: cache-jdk
        uses: actions/cache@v4
        with:
          path: ~/valhalla-jdk
          key: valhalla-jdk-27-ea-linux-x64

      - name: Download Valhalla JDK 27 EA
        if: steps.cache-jdk.outputs.cache-hit != 'true'
        run: |
          url="https://builds.shipilev.net/openjdk-jdk-valhalla/openjdk-jdk-valhalla-latest-linux-x86_64-server-release.tar.xz"
          mkdir -p ~/valhalla-jdk
          curl -L --retry 3 "$url" | tar -xJ --strip-components=1 -C ~/valhalla-jdk

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=$HOME/valhalla-jdk" >> "$GITHUB_ENV"
          echo "$HOME/valhalla-jdk/bin" >> "$GITHUB_PATH"

      - name: Verify JDK
        run: java -version

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('pom.xml') }}
          restore-keys: maven-

      - name: Run tests
        run: ./mvnw test
